name: VDSina Status Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run status check
        run: node scripts/checker.mjs

      - name: Commit updated data
        run: |
          git config user.name "VDSina Status Bot"
          git config user.email "bot@vdsina-status.github.io"
          git add data/
          git diff --cached --quiet || git commit -m "status: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
