name: VDSina Status Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: status-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run status check
        run: node scripts/checker.mjs

      - name: Commit and push
        run: |
          git config user.name "VDSina Status Bot"
          git config user.email "bot@vdsina-status.github.io"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "status: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main || true
          git push
